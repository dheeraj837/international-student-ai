services:

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: uscis_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uscis_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: uscis_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  qdrant_data:
    driver: local